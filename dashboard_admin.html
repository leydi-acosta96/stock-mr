<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Administrador</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>Panel de Administración</h1>
    <p>Bienvenida, <span id="nombreAdmin"></span></p>
    <button id="btnLogout">Cerrar sesión</button>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="dashboard-container">

    <!-- MENÚ LATERAL -->
    <aside class="sidebar">
      <button data-section="inicio" class="active">Inicio</button>
      <button data-section="emprendedoras">Emprendedoras</button>
      <button data-section="productos">Productos</button>
      <button data-section="ventas">Ventas</button>
      <button data-section="reportes">Reportes</button>
    </aside>

    <!-- CONTENIDO -->
    <div class="app">

  <aside class="sidebar">
    <div class="brand">
      <h2>🌿 Rosé Admin</h2>
    </div>

    <nav>
      <button data-section="inicio" class="active">Dashboard</button>
      <button data-section="productos">Productos</button>
      <button data-section="ventas">Ventas</button>
      <button data-section="reportes">Reportes</button>
    </nav>

    <button id="btnLogout" class="logout">Cerrar sesión</button>
  </aside>

  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1 id="tituloSeccion">Dashboard</h1>
      <div class="user-info">
        👤 <span id="nombreAdmin"></span>
      </div>
    </div>

    <!-- Contenido dinámico -->
    <section id="inicio" class="section active">
      <div class="cards">
        <div class="card">
          <h3>Total Productos</h3>
          <p>120</p>
        </div>

        <div class="card">
          <h3>Ventas del Mes</h3>
          <p>$4,500</p>
        </div>

        <div class="card">
          <h3>Emprendedoras</h3>
          <p>35</p>
        </div>
      </div>
    </section>

    <section id="productos" class="section">
      <h2>Gestión de Productos</h2>
    </section>

    <section id="ventas" class="section">
      <h2>Ventas</h2>
    </section>

    <section id="reportes" class="section">
      <h2>Reportes</h2>
    </section>

    </main>

  </div>

  <!-- SCRIPT (MUY IMPORTANTE QUE VAYA AL FINAL) -->
  <script src="dashboard_admin.js"></script>

</body>
</html>
